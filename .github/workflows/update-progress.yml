name: Update raid progress

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-progress.yml
      - scripts/update-progress.mjs
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update progress.json
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: node scripts/update-progress.mjs

      - name: Commit updated progress
        run: |
          if git diff --quiet -- progress.json; then
            echo "No progress changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add progress.json
          git commit -m "Update raid progress"
          git push
